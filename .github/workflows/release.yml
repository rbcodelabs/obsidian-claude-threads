name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        run: |
          TAG="${{ github.ref_name }}"
          MANIFEST=$(jq -r '.version' manifest.json)
          if [ "v${MANIFEST}" != "${TAG}" ]; then
            echo "❌ manifest.json version (${MANIFEST}) does not match tag (${TAG})"
            echo "Run: npm version ${TAG#v} then push the bump commit before tagging."
            exit 1
          fi
          echo "✅ manifest.json version (${MANIFEST}) matches tag (${TAG})"

      - name: Build
        run: npm run build

      - name: Update versions.json
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          MIN_APP=$(jq -r '.minAppVersion' manifest.json)
          # Prepend new version entry (jq merges left-to-right, so put new key first)
          jq --arg v "$VERSION" --arg m "$MIN_APP" \
            '{($v): $m} + .' versions.json > versions.tmp && mv versions.tmp versions.json

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Auto-generated release assets." \
            dist/main.js \
            dist/styles.css \
            manifest.json \
            versions.json \
          || gh release upload "${{ github.ref_name }}" \
            --clobber \
            dist/main.js \
            dist/styles.css \
            manifest.json \
            versions.json
